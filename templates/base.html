<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI Business Proposal Generator{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
  <link rel="icon" href="{{ url_for('static', filename='icons/icon-192.png') }}" />
  <meta name="theme-color" content="#16a34a" />
</head>
<body>
  <div class="header-gradient"></div>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ url_for('index') }}" class="logo">
        <span class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </span>
        AI Business Proposal Generator
      </a>
      <nav class="site-nav">
        <a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}style="background:var(--green-bg);color:var(--green-dark);"{% endif %}>Generate</a>
        <a href="{{ url_for('dashboard') }}" {% if request.endpoint == 'dashboard' %}style="background:var(--green-bg);color:var(--green-dark);"{% endif %}>Dashboard</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <span>
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/><path d="M12 6v6l4 2"/></svg>
      &copy; 2026 AI Business Proposal Generator &mdash; Powered by Groq AI
    </span>
  </footer>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(console.error);
    }
  </script>
</body>
</html>
